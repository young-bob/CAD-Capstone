services:
  postgres:
    image: postgres:17
    container_name: vsms-postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root123
      POSTGRES_DB: vsms
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./Backend/VSMS.SQL:/docker-entrypoint-initdb.d
    networks:
      - vsms-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d vsms"]
      interval: 5s
      timeout: 5s
      retries: 5

  silo:
    build:
      context: .
      dockerfile: Dockerfile_Silo
    image: vsms-silo
    container_name: vsms-silo
    environment:
      - ORLEANS_CLUSTERING_TYPE=AdoNet
      - ConnectionStrings__PostgreSQL=Host=10.20.30.3;Port=5432;Database=vsms;Username=root;Password=root123
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "11111:11111"
      - "30000:30000"
    networks:
      - vsms-net

  api:
    build:
      context: .
      dockerfile: Dockerfile_API
    image: vsms-api
    container_name: vsms-api
    environment:
      - ORLEANS_CLUSTERING_TYPE=AdoNet
      - ConnectionStrings__PostgreSQL=Host=10.20.30.3;Port=5432;Database=vsms;Username=root;Password=root123
      # Override JWT keys for docker if needed, or use appsettings defaults
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      silo:
        condition: service_started
    ports:
      - "8080:8080"
    networks:
      - vsms-net

networks:
  vsms-net:
    driver: bridge
    name: vsms-net


