# ============================================================
# VSMS — MinIO File Storage (文件存储服务器)
# ============================================================
# Deploy on: DB Server (10.20.30.4) alongside PostgreSQL
#
# Provides: S3-compatible object storage for:
#   - Volunteer certificates (PDF)
#   - Credential uploads
#   - Attendance proof photos
#
# Usage:
#   podman-compose -f podman-compose.file.yml up -d
#
# Admin Console: http://10.20.30.4:9001
# API Endpoint:  http://10.20.30.4:9000
# ============================================================

services:
  minio:
    image: docker.io/minio/minio:latest
    container_name: vsms-minio
    network_mode: "host"
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
