# ============================================================
# VSMS Backend — Podman Compose (单机部署)
# ============================================================
# Usage:
#   podman-compose up -d          # Start all services
#   podman-compose down           # Stop and remove
#   podman-compose logs -f api    # Tail API logs
# ============================================================

services:
  # ==================== PostgreSQL ====================
  postgres:
    image: docker.io/library/postgres:17
    container_name: vsms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vsms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: vsms
    ports:
      - "5432:5432"
    networks:
      - vsms-net
    volumes:
      - ./data/postgres:/var/lib/postgresql/data:Z
      - ./backend/VSMS.SQL:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vsms -d vsms"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ==================== MinIO File Storage ====================
  minio:
    image: docker.io/minio/minio:latest
    container_name: vsms-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - vsms-net
    volumes:
      - ./data/minio:/data:Z
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ==================== VSMS API + Orleans Silo ====================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vsms-api
    image: vsms-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - vsms-net
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__PostgreSQL: "Host=postgres;Port=5432;Database=vsms;Username=vsms;Password=${POSTGRES_PASSWORD}"
      Jwt__Secret: ${JWT_SECRET}
      Jwt__Issuer: VSMS.Api
      Jwt__Audience: VSMS.Client
      Jwt__ExpirationMinutes: 60
      # ---- MinIO (single-machine: connect via docker network) ----
      Minio__Endpoint: minio:9000
      Minio__AccessKey: ${MINIO_ACCESS_KEY}
      Minio__SecretKey: ${MINIO_SECRET_KEY}
      Minio__BucketName: vsms
      Minio__UseSsl: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/swagger/v1/swagger.json"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ==================== VSMS Web Frontend ====================
  web:
    build:
      context: .
      dockerfile: Dockerfile_Web
    container_name: vsms-web
    image: vsms-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8081:8081"
    networks:
      - vsms-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  vsms-net:
    driver: bridge
    name: vsms-net
