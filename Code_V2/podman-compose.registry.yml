# ============================================================
# VSMS — Registry Server
# ============================================================
#
# Usage:
#   podman compose -f podman-compose.registry.yml up -d
# ============================================================

services:
  vsms-registry:
    image: docker.io/library/registry:2
    container_name: vsms-registry
    network_mode: "host"
    ports:
      - "5000:5000"
    environment:
      - REGISTRY_STORAGE_DELETE_ENABLED=true
    volumes:
      - ./data/registry:/var/lib/registry:Z
    restart: always