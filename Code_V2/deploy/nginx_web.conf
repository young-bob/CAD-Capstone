server {
    listen 8081;
    server_name _;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    # ==================== Gzip Compression ====================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # ==================== SPA Entry Point ====================
    # index.html must never be cached (SPA routing + cache-busting)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ==================== Static Assets (Vite hashed filenames) ====================
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ==================== APK Download ====================
    location /download/ {
        types { application/vnd.android.package-archive apk; }
        default_type application/octet-stream;
        add_header Content-Disposition "attachment";
    }

    # ==================== SPA Fallback ====================
    # Only serve index.html for paths that look like SPA routes
    # (no file extension = likely a frontend route)
    location / {
        try_files $uri $uri/ @spa;
    }

    location @spa {
        # If the request has a file extension, it is NOT a SPA route -> 404
        if ($uri ~ \.\w+$) {
            return 404;
        }
        rewrite ^ /index.html last;
    }
}