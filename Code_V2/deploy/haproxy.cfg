global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

    # TLS 1.3 only with strong cipher suites
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.3 no-tls-tickets

    maxconn 1000
    tune.ssl.default-dh-param 2048

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull

    # Slowloris protection: reduced timeouts
    timeout connect  5s
    timeout client  10s
    timeout server  30s
    timeout http-request 5s
    timeout http-keep-alive 5s
    timeout queue 10s

    # Limit request/response buffer
    option http-buffer-request

    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 503 /etc/haproxy/errors/503.http

# ==================== Anti-Scan: Rate Limiting ====================
# Track per-IP request rate over 10s window, store up to 100k entries
# Entries expire after 30 minutes of inactivity

frontend http-in
    bind *:80

    # --- Stick table: track request rate per source IP ---
    stick-table type ip size 100k expire 30m store http_req_rate(10s),conn_cur

    # --- Domain whitelist (apply before rate tracking) ---
    acl is_well_known path_beg /.well-known/
    acl is_my_domain hdr(host) -i www.vsms.foo vsms.foo

    # Non-matching domain: silent drop (scanner gets no response at all)
    http-request silent-drop if !is_my_domain !is_well_known

    # ACME challenge passthrough
    acl is_acme_challenge path_beg /.well-known/acme-challenge/

    # Redirect to HTTPS first (HAProxy evaluates redirect before use_backend)
    redirect scheme https code 301 if !{ ssl_fc } !is_acme_challenge

    use_backend acme_solver if is_acme_challenge

frontend https-in
    bind *:443 ssl crt /etc/ssl/private/www.vsms.foo.pem alpn h2,http/1.1

    # --- Stick table: track request rate per source IP ---
    stick-table type ip size 100k expire 30m store http_req_rate(10s),conn_cur
    http-request track-sc0 src

    # ==================== Layer 1: Domain Whitelist ====================
    acl is_well_known path_beg /.well-known/
    acl is_my_domain hdr(host) -i www.vsms.foo vsms.foo

    # Non-matching domain: silent drop
    http-request silent-drop if !is_my_domain !is_well_known

    # ==================== Layer 2: Rate Limiting ====================
    # More than 30 requests in 10 seconds from same IP = abuse
    acl is_abuser sc0_http_req_rate gt 30
    # More than 10 concurrent connections from same IP = abuse
    acl too_many_conns sc0_conn_cur gt 10
    http-request deny deny_status 429 if is_abuser
    http-request deny deny_status 429 if too_many_conns

    # ==================== Layer 3: Malicious User-Agent ====================
    acl is_scanner hdr_sub(User-Agent) -i zgrab nuclei masscan nikto sqlmap
    acl is_scanner hdr_sub(User-Agent) -i dirbuster gobuster ffuf wfuzz nmap
    acl is_scanner hdr_sub(User-Agent) -i Go-http-client python-requests python-urllib
    acl is_scanner hdr_sub(User-Agent) -i curl/7 curl/8 Wget/ libwww-perl
    acl is_scanner hdr_sub(User-Agent) -i scrapy HttpClient Java/ okhttp
    acl is_scanner hdr_sub(User-Agent) -i censys shodan
    acl is_empty_ua hdr_cnt(User-Agent) eq 0

    # Tarpit scanners: hold connection open for 30s then drop (wastes their time)
    http-request tarpit deny_status 500 if is_scanner
    http-request tarpit deny_status 500 if is_empty_ua
    timeout tarpit 30s

    # ==================== Layer 4: Path-Based Blocking ====================
    # Hidden files (except .well-known)
    acl is_hidden_path path -m reg ^/\.
    http-request silent-drop if is_hidden_path !is_well_known

    # Common scan targets: silent drop (no information leakage)
    acl is_scan_path path_beg -i /wp-admin /wp-login /wp-content /wp-includes
    acl is_scan_path path_beg -i /wordpress /joomla /drupal /magento
    acl is_scan_path path_beg -i /phpmyadmin /pma /myadmin /mysql /adminer
    acl is_scan_path path_beg -i /cgi-bin /shell /cmd /console /debug
    acl is_scan_path path_beg -i /vendor /composer /node_modules /config
    acl is_scan_path path_beg -i /backup /dump /db /database /sql
    acl is_scan_path path_beg -i /actuator /manager /admin /login.action
    acl is_scan_path path_end -i .php .asp .aspx .jsp .cgi .bak .sql .log
    acl is_scan_path path_end -i .env .ini .conf .yml .yaml .xml .json.bak
    http-request silent-drop if is_scan_path

    # Swagger/API docs blocked in production
    acl is_sensitive_path path_beg -i /swagger
    http-request deny if is_sensitive_path

    # ==================== Layer 5: Request Size Limit ====================
    # Block requests with body larger than 10MB
    acl too_big req.body_size gt 10485760
    http-request deny deny_status 413 if too_big

    # ==================== Domain Redirect ====================
    acl is_root_domain hdr(host) -i vsms.foo
    http-request redirect prefix https://www.vsms.foo code 301 if is_root_domain

    # ==================== Security Response Headers ====================
    http-response set-header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    http-response set-header Server "VSMS-Gateway"
    http-response set-header X-Content-Type-Options "nosniff"
    http-response set-header X-Frame-Options "DENY"
    http-response set-header Referrer-Policy "strict-origin-when-cross-origin"
    # Remove server version headers from backends
    http-response del-header X-Powered-By

    # ==================== Routing ====================
    acl url_api path_beg /api
    use_backend api_cluster if url_api

    default_backend web_server

# ==================== Backends ====================

backend web_server
    option forwardfor
    http-request set-header X-Forwarded-Proto https
    server web01 127.0.0.1:8081 check inter 10000 fall 3

backend api_cluster
    mode http
    option forwardfor
    http-request set-header X-Forwarded-Proto https

    balance roundrobin

    server api01 10.18.1.226:8080 check inter 10000 fall 3
    server api02 10.18.1.207:8080 check inter 10000 fall 3
    server api03 10.17.1.32:8080 check inter 10000 fall 3
    server api04 10.17.1.224:8080 check inter 10000 fall 3
    server api05 10.19.1.25:8080 check inter 10000 fall 3

backend acme_solver
    server acme_standalone 127.0.0.1:8888
